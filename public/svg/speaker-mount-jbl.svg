<svg xmlns="http://www.w3.org/2000/svg" viewBox="-180 0 444 100" width="444" height="100">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700&amp;display=swap');
      .node-label {
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        font-size: 14px;
      }
    </style>
  </defs>

  <!-- ============================================================
       COLOR PALETTE
       Outer ring (darkest):   #6b2554
       Inner ring (mid tone):  #d63a99
       Center + border + text: #ff00ca
       Box background:         #0f172a
       Center stroke:          #ffffff
  ============================================================ -->

  <!-- Outer pulse ring -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#6b2554" stroke-width="8" opacity="0">
    <animate attributeName="r" values="10; 42" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6; 0" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Inner pulse ring -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#d63a99" stroke-width="6" opacity="0">
    <animate attributeName="r" values="10; 28" dur="2s" begin="0.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8; 0" dur="2s" begin="0.5s" repeatCount="indefinite" />
  </circle>

  <!-- Center solid node -->
  <circle cx="50" cy="50" r="9" fill="#ff00ca" stroke="#ffffff" stroke-width="3" />

  <!-- Label box -->
  <rect x="77" y="30" width="187" height="40" rx="6" fill="#0f172a" stroke="#ff00ca" stroke-width="2" />

  <!-- Label text -->
  <text x="170.5" y="50" text-anchor="middle" dominant-baseline="central"
        class="node-label" fill="#ff00ca">SPEAKER MOUNT - JBL</text>
</svg>
